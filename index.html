<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caixa Rocha — Financeiro</title>
<style>
  :root{
    --bg:#0b0f0d;--panel:#121814;--panel-2:#18211c;--line:#23302a;
    --txt:#eaf2ed;--muted:#8aa096;--green:#3ddc91;--red:#ff6b6b;--gold:#e8c468;--amber:#f5b740;--blue:#7da2ff;
    --accent:#3ddc91;--accent-ink:#04130c;--chip:#1d2722;
    --shadow:0 1px 0 rgba(255,255,255,.02),0 10px 30px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a3a32;border-radius:6px}
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 30%,rgba(61,220,145,.06),transparent 60%)}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:38px 32px;width:min(400px,94vw);box-shadow:var(--shadow)}
  .login-logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(140deg,#3ddc91,#1f9d6b);display:grid;place-items:center;font-weight:800;color:#04130c;font-size:26px;margin:0 auto 18px}
  .login-card h1{font-size:21px;text-align:center;margin-bottom:4px}
  .login-card .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:7px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:13px 15px;color:var(--txt);font-size:15px;outline:none}
  .field input:focus{border-color:var(--green)}
  .login-btn{width:100%;background:var(--green);color:var(--accent-ink);border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
  .login-btn:disabled{opacity:.6;cursor:wait}
  .login-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:#ffc9c9;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}
  .login-foot{text-align:center;font-size:11px;color:var(--muted);margin-top:22px}
  #app{display:none}
  #app.show{display:flex;min-height:100vh}
  .side{width:230px;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0;transition:width .18s}
  .side.collapsed{width:62px}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 16px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,#3ddc91,#1f9d6b);display:grid;place-items:center;font-weight:800;color:#04130c;font-size:17px;flex-shrink:0}
  .brand b{font-size:16px;white-space:nowrap}.brand small{display:block;font-size:10px;color:var(--muted);letter-spacing:.5px}
  .burger{margin-left:auto;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;color:var(--txt);cursor:pointer;font-size:17px;width:34px;height:34px;display:grid;place-items:center;flex-shrink:0}
  .burger:hover{background:var(--line);color:var(--green)}
  .side.collapsed .brand b,.side.collapsed .brand small,.side.collapsed .navtxt{display:none}
  .side.collapsed .brand{justify-content:center;padding:18px 10px}.side.collapsed .logo{display:none}
  .side.collapsed .burger{margin:0 auto;width:42px;height:42px}
  nav{padding:8px 10px;flex:1;overflow-y:auto}
  .seclabel{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:12px 12px 5px}
  .side.collapsed .seclabel{display:none}
  .nav{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13.5px;font-weight:550;white-space:nowrap;margin-bottom:2px;border:1px solid transparent;position:relative}
  .nav:hover{background:var(--panel-2);color:var(--txt)}
  .nav.active{background:linear-gradient(100deg,rgba(61,220,145,.16),rgba(61,220,145,.04));color:var(--green);border-color:rgba(61,220,145,.22)}
  .nav .ic{width:19px;text-align:center;font-size:15px;flex-shrink:0}
  .nav .soon{margin-left:auto;font-size:9px;background:var(--chip);color:var(--muted);padding:1px 6px;border-radius:8px;font-weight:700}
  .side.collapsed .nav{justify-content:center;padding:11px}.side.collapsed .nav .soon{display:none}
  .side.collapsed .nav:hover::after{content:attr(data-label);position:absolute;left:58px;background:#000;color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;white-space:nowrap;z-index:50;box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .sidefoot{padding:12px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
  .side.collapsed .sidefoot{display:none}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:rgba(11,15,13,.9)}
  .pagetitle{font-size:18px;font-weight:700}
  .store{margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt);max-width:230px}
  .logout{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);cursor:pointer;font-size:12px;padding:7px 12px}
  .logout:hover{border-color:var(--red);color:var(--red)}
  .content{padding:24px;max-width:1280px;width:100%}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}.two{grid-template-columns:1fr 1fr}@media(max-width:980px){.two{grid-template-columns:1fr}}
  .cardhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.cardhead h3{font-size:15px;font-weight:700}
  .tag{font-size:11px;color:var(--muted);background:var(--chip);padding:3px 10px;border-radius:20px}
  .quickbar{background:linear-gradient(100deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
  .quickrow{display:grid;gap:10px;align-items:end}
  .quickrow.l1{grid-template-columns:200px 130px 1fr 150px;margin-bottom:10px}
  .quickrow.l2{grid-template-columns:130px 1fr 1fr 150px}
  @media(max-width:900px){.quickrow.l1,.quickrow.l2{grid-template-columns:1fr 1fr}}
  .qlabel{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;display:block}
  .qin{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--txt);font-size:13.5px;outline:none;height:42px}
  .maiusc{text-transform:uppercase}
  .modal input.maiusc{text-transform:uppercase}
  .qin:focus{border-color:var(--green)}
  .qin.calc{font-variant-numeric:tabular-nums;text-align:right;font-weight:600}
  .tipo-toggle{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;overflow:hidden;height:42px}
  .tipo-toggle button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
  .tipo-toggle button.des{background:rgba(255,107,107,.15);color:var(--red)}
  .tipo-toggle button.rec{background:rgba(61,220,145,.15);color:var(--green)}
  .tipo-toggle button.tra{background:rgba(125,162,255,.15);color:var(--blue)}
  .addbtn{width:100%;height:42px;border:none;border-radius:9px;background:var(--green);color:var(--accent-ink);font-size:14px;font-weight:700;cursor:pointer}
  .addbtn:disabled{opacity:.6;cursor:wait}
  .miniadd{width:42px;height:42px;flex-shrink:0;border:1px solid var(--line);background:var(--panel-2);color:var(--green);border-radius:9px;font-size:18px;font-weight:700;cursor:pointer}
  .hint{font-size:11px;color:var(--muted);margin-top:9px;display:flex;gap:14px;flex-wrap:wrap}
  .kbd{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-family:monospace;font-size:10.5px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px}
  .search input{background:none;border:none;outline:none;color:var(--txt);font-size:13.5px;width:100%}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:11px 13px;border-bottom:1px solid var(--line);font-weight:700}
  tbody td{padding:11px 13px;border-bottom:1px solid var(--line);font-size:13px}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr.neutra{background:rgba(125,162,255,.06)}
  .amt{font-variant-numeric:tabular-nums;font-weight:650;text-align:right}
  .amt.green{color:var(--green)}.amt.red{color:var(--red)}.amt.blue{color:var(--blue)}
  .catchip{font-size:11.5px;background:var(--chip);padding:3px 11px;border-radius:20px;border:1px solid var(--line)}
  .catchip.neutra{border-color:var(--blue);color:var(--blue);background:rgba(125,162,255,.08)}
  .contchip{font-size:11.5px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
  .contchip.emp{background:rgba(232,196,104,.1);color:var(--gold);border-color:rgba(232,196,104,.3)}
  .contchip.func{background:rgba(125,162,255,.1);color:var(--blue);border-color:rgba(125,162,255,.3)}
  .parc{font-size:10.5px;color:var(--gold);background:rgba(232,196,104,.1);padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:700}
  .mut{color:var(--muted)}
  .delx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;opacity:.5}.delx:hover{opacity:1;color:var(--red)}
  .empty{text-align:center;padding:44px;color:var(--muted)}.empty .big{font-size:36px;margin-bottom:12px;opacity:.6}
  .cfgrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}.cfgrow:last-child{border:none}
  .grp{font-size:10.5px;padding:2px 9px;border-radius:20px;font-weight:700;text-transform:uppercase}
  .grp.rec{background:rgba(61,220,145,.14);color:var(--green)}.grp.cmv{background:rgba(232,196,104,.14);color:var(--gold)}
  .grp.imp{background:rgba(192,132,252,.14);color:#c084fc}.grp.fixo{background:rgba(125,162,255,.14);color:var(--blue)}
  .grp.nop{background:rgba(255,107,107,.14);color:var(--red)}.grp.neutra{background:rgba(138,160,150,.18);color:var(--muted)}.grp.adef{background:rgba(245,183,64,.18);color:var(--amber)}
  .btn{background:var(--green);color:var(--accent-ink);border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
  .arqbtn{margin-left:12px;font-size:11.5px;color:var(--muted);cursor:pointer;padding:3px 9px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
  .arqbtn:hover{color:var(--amber);border-color:var(--amber)}.arqbtn.ativar:hover{color:var(--green);border-color:var(--green)}
  .note{background:rgba(125,162,255,.08);border:1px solid rgba(125,162,255,.2);border-radius:12px;padding:13px 15px;font-size:12.5px;color:#aec2ff;margin-bottom:16px;line-height:1.5}
  .note.soon{background:rgba(245,183,64,.08);border-color:rgba(245,183,64,.25);color:#f5d98a}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;z-index:100}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;width:min(440px,94vw);box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h3{font-size:16px;margin-bottom:8px}.modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
  .modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--txt);font-size:14px;outline:none;margin-bottom:14px}
  .modal .qlabel{margin-bottom:5px}
  .modal-btns{display:flex;gap:10px;justify-content:flex-end}
  .err{color:var(--red);font-size:12px;margin-top:-8px;margin-bottom:12px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading{text-align:center;padding:50px;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);color:#fff}
  .toast.ok{background:var(--green);color:#04130c}.toast.erro{background:var(--red)}
</style>
</head>
<body>
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="login-logo">R</div>
      <h1>Caixa Rocha</h1>
      <div class="sub">Sistema Financeiro · entre para continuar</div>
      <div class="login-err" id="loginErr"></div>
      <div class="field"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com" autocomplete="username" /></div>
      <div class="field"><label>Senha</label><input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()" /></div>
      <button class="login-btn" id="loginBtn" onclick="fazerLogin()">Entrar</button>
      <div class="login-foot">Grupo Rocha · acesso restrito</div>
    </div>
  </div>

  <div id="app">
    <aside class="side" id="side">
      <div class="brand"><div class="logo">R</div><b>Caixa Rocha<small>FINANCEIRO</small></b>
        <button class="burger" id="burgerBtn" title="Fechar menu" onclick="toggleMenu()">‹</button></div>
      <nav id="nav"></nav>
      <div class="sidefoot" id="sidefoot">—</div>
    </aside>
    <div class="main">
      <div class="topbar">
        <span class="pagetitle" id="ptitle">Dashboard</span>
        <select class="store" id="store" onchange="trocarLoja()"></select>
        <button class="logout" onclick="sair()">Sair</button>
      </div>
      <div class="content" id="content"><div class="loading"><span class="spin"></span> Carregando...</div></div>
    </div>
  </div>
  <div id="modalRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
  let sb=null, conectado=false;
  let USER=null, PERFIL={nome:'',papel:''};
  let LOJAS=[], CATS=[], CONTATOS=[], CONTAS=[], LANC=[];
  let lojaAtual=null;
  let page='visao', tipo='des', q='', busy=false;
  let filtroDia=''; // '' = todos os dias; senão 'YYYY-MM-DD'

  const BRL=n=>(n<0?'-':'')+'R$ '+Math.abs(Number(n)).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const GRUPOS={rec:{nome:'Receita',cls:'rec'},cmv:{nome:'CMV',cls:'cmv'},imp:{nome:'Imposto',cls:'imp'},fixo:{nome:'Custo Fixo',cls:'fixo'},nop:{nome:'Não Operacional',cls:'nop'},neutra:{nome:'Neutra',cls:'neutra'},adef:{nome:'A definir',cls:'adef'}};
  const ANO_FIXO=2026;

  function initSupabase(){
    try{
      if(typeof supabase==='undefined'){loginErro('A biblioteca não carregou. Abra pelo link do Vercel (hospedado).');return false;}
      sb=supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      conectado=true;return true;
    }catch(e){loginErro('Erro ao conectar: '+e.message);return false;}
  }
  function loginErro(msg){const el=document.getElementById('loginErr');el.textContent=msg;el.style.display='block';}

  async function fazerLogin(){
    const email=document.getElementById('email').value.trim();
    const senha=document.getElementById('senha').value;
    const btn=document.getElementById('loginBtn');
    document.getElementById('loginErr').style.display='none';
    if(!email||!senha){loginErro('Preencha e-mail e senha.');return;}
    if(!conectado&&!initSupabase())return;
    btn.disabled=true;btn.textContent='Entrando...';
    try{
      const {data,error}=await sb.auth.signInWithPassword({email,password:senha});
      if(error){loginErro('E-mail ou senha incorretos.');btn.disabled=false;btn.textContent='Entrar';return;}
      await iniciarApp(data.user);
    }catch(e){loginErro('Erro: '+e.message);btn.disabled=false;btn.textContent='Entrar';}
  }
  async function sair(){if(sb)await sb.auth.signOut();location.reload();}

  async function iniciarApp(user){
    USER=user;
    try{const {data}=await sb.from('perfis').select('nome,papel').eq('id',user.id).single();if(data)PERFIL=data;}catch(e){}
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').classList.add('show');
    document.getElementById('sidefoot').textContent=PERFIL.nome+' · '+PERFIL.papel;
    await carregarBase();
    renderNav();render();
  }
  async function carregarBase(){
    const {data:lojas}=await sb.from('lojas').select('*').eq('arquivada',false).order('ordem');
    LOJAS=lojas||[];
    if(LOJAS.length && !lojaAtual)lojaAtual=LOJAS[0].id;
    const {data:cats}=await sb.from('categorias').select('*').order('nome');CATS=cats||[];
    const {data:cont}=await sb.from('contatos').select('*').order('nome');CONTATOS=cont||[];
    await carregarContas();
    document.getElementById('store').innerHTML=LOJAS.map(l=>`<option value="${l.id}" ${l.id===lojaAtual?'selected':''}>${l.nome}</option>`).join('');
  }
  async function carregarContas(){const {data}=await sb.from('contas').select('*').eq('loja_id',lojaAtual).eq('arquivada',false).order('nome');CONTAS=data||[];}
  async function carregarLancamentos(){
    const {data}=await sb.from('lancamentos').select('*, categorias(nome,grupo), contatos(nome,tipo), contas(nome)').eq('loja_id',lojaAtual).order('data',{ascending:true}).limit(2000);
    LANC=data||[];
  }
  let LANC_ANO=[];
  async function carregarLancAno(){
    const {data}=await sb.from('lancamentos').select('data,valor,categorias(nome,grupo)').eq('loja_id',lojaAtual).gte('data',ANO_FIXO+'-01-01').lte('data',ANO_FIXO+'-12-31').limit(5000);
    LANC_ANO=data||[];
  }
  async function trocarLoja(){
    lojaAtual=parseInt(document.getElementById('store').value,10);
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    await carregarContas();render();
  }

  const MENU=[
    ['__d','Dia a dia'],
    ['visao','Dashboard','◫',true],['lanc','Lançamentos','≣',true],['import','Importar extrato','⤓',true],
    ['apagar','A pagar','🧾',true],['caixa','Fechamento de caixa','🧮',true],
    ['__a','Análise'],
    ['dre','DRE','📊',true],['fechamento','Fechamento do mês','🔐',true],
    ['comparativo','Comparativo','📈',true],['relcontato','Por contato','👥',true],
    ['__g','Gestão'],
    ['categorias','Categorias','🏷️',true],['cadcontatos','Contatos','👤',true],
    ['recorrentes','Recorrentes','🔁',true],['lixeira','Lixeira','🗑',true],['config','Configurações','⚙',true],
  ];
  const TITLES={visao:'Dashboard',lanc:'Lançamentos',import:'Importar extrato',apagar:'A pagar',caixa:'Fechamento de caixa',dre:'DRE — Resultado',fechamento:'Fechamento do mês',comparativo:'Comparativo',relcontato:'Relatório por contato',categorias:'Categorias',cadcontatos:'Contatos',recorrentes:'Recorrentes',lixeira:'Lixeira',config:'Configurações'};
  function renderNav(){
    document.getElementById('nav').innerHTML=MENU.map(it=>{
      if(it[0].startsWith('__'))return `<div class="seclabel">${it[1]}</div>`;
      const [id,l,ic,pronto]=it;
      return `<div class="nav ${id===page?'active':''}" data-label="${l}" onclick="go('${id}')"><span class="ic">${ic}</span><span class="navtxt">${l}</span>${pronto?'':'<span class="soon">em breve</span>'}</div>`;
    }).join('');
  }
  function go(p){page=p;q='';document.getElementById('ptitle').textContent=TITLES[p]||p;renderNav();render();}
  function toggleMenu(){const s=document.getElementById('side');s.classList.toggle('collapsed');const c=s.classList.contains('collapsed');const b=document.getElementById('burgerBtn');b.title=c?'Abrir menu':'Fechar menu';b.innerHTML=c?'›':'‹';}

  function catsAtivas(){return CATS.filter(c=>!c.arquivada);}
  function contatosAtivos(){return CONTATOS.filter(c=>!c.arquivado);}
  function catsOptions(sel){
    const ordem=['rec','cmv','imp','fixo','nop','adef'];let html='';
    ordem.forEach(g=>{const it=catsAtivas().filter(c=>c.grupo===g);if(!it.length)return;

  function calcInput(el,e){if(e.key==='Enter')return;if(!/[0-9]/.test(e.key)&&e.key!=='Backspace')return;e.preventDefault();let c=parseInt(el.dataset.cents||'0',10);if(e.key==='Backspace')c=Math.floor(c/10);else c=c*10+parseInt(e.key,10);if(c>9999999999)c=parseInt(el.dataset.cents||'0',10);el.dataset.cents=c;el.value=(c/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function maskData(el,e){if(e.key==='Enter'||e.key==='Tab'||e.ctrlKey||e.metaKey)return;if(e.key.length===1&&!/[0-9]/.test(e.key)){e.preventDefault();return;}if(e.key!=='Backspace'&&!/[0-9]/.test(e.key))return;e.preventDefault();let dm=el.dataset.dm||'';if(e.key==='Backspace')dm=dm.slice(0,-1);else if(dm.length<4)dm=dm+e.key;el.dataset.dm=dm;let out=dm;if(dm.length>2)out=dm.slice(0,2)+'/'+dm.slice(2);if(dm.length===4)out=dm.slice(0,2)+'/'+dm.slice(2)+'/'+ANO_FIXO;el.value=out;}
  function dataParaISO(str){const m=str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(!m)return null;const d=+m[1],mes=+m[2],a=+m[3];if(mes<1||mes>12||d<1||d>31||a<2020||a>2035)return null;return `${a}-${m[2]}-${m[1]}`;}
  function isoParaBR(iso){if(!iso)return '';const[a,m,d]=iso.split('-');return `${d}/${m}/${a}`;}

  function viewEmBreve(){

      <div class="toolbar" style="position:sticky;top:64px;z-index:15;background:var(--bg);padding:8px 0">
        <div class="search">🔍<input id="buscaLanc" placeholder="Buscar por texto, contato ou valor..." value="${q}" oninput="filtrarLanc(this.value)"></div>
        <div style="display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:6px 10px">
          <button class="burger" style="width:30px;height:30px" title="Dia anterior" onclick="navDia(-1)">‹</button>

          <button class="burger" style="width:30px;height:30px" title="Próximo dia" onclick="navDia(1)">›</button>
          <input type="date" value="${filtroDia||''}" onchange="filtroDia=this.value;render()" style="background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:5px 8px;font-size:12px" title="Escolher dia">

  // gera só os totais + tabela (usado pela busca sem redesenhar a barra)
  function htmlResultadoLanc(rows,somaE,somaS){
    const tr=rows.map(l=>{

  // filtra os lançamentos pela busca, atualizando SÓ a tabela (sem recriar a barra)
  function filtrarLanc(valor){
    q=valor;
    const qn=q.replace(/[^0-9,]/g,'').replace(',','.');
    const rows=LANC.filter(l=>{
      if(filtroDia && l.data!==filtroDia)return false;
      if(!q)return true;
      const cat=(l.categorias&&l.categorias.nome)||'';const cont=(l.contatos&&l.contatos.nome)||'';
      const txt=(l.descricao||'').toLowerCase().includes(q.toLowerCase())||cat.toLowerCase().includes(q.toLowerCase())||cont.toLowerCase().includes(q.toLowerCase());
      const val=qn&&Math.abs(l.valor).toFixed(2).includes(qn);return txt||val;
    });
    let somaE=0,somaS=0;rows.forEach(l=>{if(l.valor>0)somaE+=Number(l.valor);else somaS+=Math.abs(Number(l.valor));});

  function navDia(d){

    filtroDia=dt.toISOString().slice(0,10);render();

  async function salvarLanc(){
    if(busy)return;
    const desc=document.getElementById('qDesc').value.trim();
    const cents=parseInt(document.getElementById('qVal').dataset.cents||'0',10);
    const catId=document.getElementById('qCat').value;
    const contatoId=document.getElementById('qContato').value;
    const pa=document.getElementById('qParcA').value,pb=document.getElementById('qParcB').value;
    const parc=(pa&&pb)?`${pa}/${pb}`:null;
    const dataStr=document.getElementById('qData').value;
    const doc=document.getElementById('qDoc').value.trim();
    const contaId=document.getElementById('qConta').value;
    const isTra=tipo==='tra';
    if(!desc){toast('Preencha a descrição','erro');return;}
    if(!cents){toast('Preencha o valor','erro');return;}
    const iso=dataParaISO(dataStr);
    if(!iso){toast('Data inválida (use dia/mês)','erro');return;}
    if(!catId){toast('Escolha a categoria','erro');return;}
    if(!contatoId && categoriaExigeContato(catId)){toast('Para Funcionários, escolha o contato (qual funcionário)','erro');return;}
    const v=cents/100;
    const tipoDb=isTra?'transferencia':(tipo==='rec'?'receita':'despesa');
    const valor=(tipo==='rec')?v:-v;
    busy=true;const btn=document.getElementById('btnLancar');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
    const {error}=await sb.from('lancamentos').insert({
      loja_id:lojaAtual,conta_id:contaId||null,data:iso,descricao:desc.toUpperCase(),
      valor,tipo:tipoDb,categoria_id:catId,contato_id:contatoId,parcela:parc,
      documento:doc||null,pago:true,origem:'manual',criado_por:USER.id
    });
    busy=false;
    if(error){toast('Erro ao salvar: '+error.message,'erro');if(btn){btn.disabled=false;btn.textContent='+ Lançar';}return;}
    toast('Lançamento salvo!','ok');await viewLanc();
  }
  async function excluirLanc(id){
    const senha=prompt('Digite a senha para excluir este lançamento:');
    if(senha===null)return;
    if(senha!=='1234'){toast('Senha incorreta','erro');return;}
    const l=LANC.find(x=>x.id===id);
    await sb.from('lixeira').insert({loja_id:lojaAtual,dados:l,excluido_por:USER.id});
    const {error}=await sb.from('lancamentos').delete().eq('id',id);
    if(error){toast('Erro ao excluir: '+error.message,'erro');return;}
    toast('Excluído (foi pra lixeira)','ok');await viewLanc();
  }

        ?'<div style="background:rgba(61,220,145,.15);border:1px solid rgba(61,220,145,.4);color:var(--green);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;margin-bottom:14px;text-align:center">🟢 ENTRADA — recebimento de dinheiro</div>'
        :'<div style="background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:var(--red);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;margin-bottom:14px;text-align:center">🔴 SAÍDA — pagamento</div>'}

    </div></div>`;

  async function salvarEditarLanc(id,proximo,anterior){
    const l=LANC.find(x=>x.id===id);
    const cat=document.getElementById('edCat').value;const contato=document.getElementById('edContato').value;
    if(!cat){document.getElementById('edErr').innerHTML='<div class="err">Escolha a categoria.</div>';return;}
    if(!contato && categoriaExigeContato(cat)){document.getElementById('edErr').innerHTML='<div class="err">Para Funcionários, escolha qual funcionário.</div>';return;}
    const cents=parseInt(document.getElementById('edVal').dataset.cents||'0',10);
    const pa=document.getElementById('edParcA').value,pb=document.getElementById('edParcB').value;
    const iso=dataParaISO(document.getElementById('edData').value)||l.data;
    const {error}=await sb.from('lancamentos').update({
      data:iso,descricao:document.getElementById('edDesc').value.toUpperCase(),
      valor:(l.valor<0?-1:1)*(cents/100),categoria_id:cat,contato_id:contato,
      conta_id:document.getElementById('edConta').value||null,
      parcela:(pa&&pb)?`${pa}/${pb}`:null,documento:document.getElementById('edDoc').value||null
    }).eq('id',id);
    if(error){toast('Erro: '+error.message,'erro');return;}
    Object.assign(l,{data:iso,descricao:document.getElementById('edDesc').value.toUpperCase(),valor:(l.valor<0?-1:1)*(cents/100),categoria_id:cat,contato_id:contato});
    const catObj=CATS.find(c=>c.id==cat);if(catObj)l.categorias={nome:catObj.nome,grupo:catObj.grupo};
    const contObj=CONTATOS.find(c=>c.id==contato);if(contObj)l.contatos={nome:contObj.nome,tipo:contObj.tipo};
    const idx=LANC.findIndex(x=>x.id===id);
    if(anterior){
      const ant=LANC[idx-1];
      if(ant){toast('Salvo! ← Anterior','ok');filtrarLanc(q);abrirEditarLanc(ant.id);return;}
      else {toast('Salvo! Era o primeiro.','ok');fecharModal();filtrarLanc(q);return;}
    }
    if(proximo){
      const prox=LANC[idx+1];
      if(prox){toast('Salvo! Próximo →','ok');filtrarLanc(q);abrirEditarLanc(prox.id);return;}
      else {toast('Salvo! Era o último.','ok');fecharModal();await viewLanc();return;}
    }
    fecharModal();toast('Salvo!','ok');filtrarLanc(q);
  }

  // ---- DRE ----
  async function viewDRE(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Calculando DRE...</div>';
    await carregarLancAno();
    // soma por mês e grupo
    const meses=Array.from({length:12},(_,i)=>({rec:0,cmv:0,imp:0,fixo:0,nop:0}));
    LANC_ANO.forEach(l=>{
      const g=l.categorias&&l.categorias.grupo;if(!g||g==='neutra'||g==='adef')return;
      const m=parseInt(l.data.split('-')[1],10)-1;
      const v=Math.abs(Number(l.valor));
      if(meses[m][g]!==undefined)meses[m][g]+=v;
    });
    // só mostra meses que têm algum movimento
    const comDados=[];
    meses.forEach((m,i)=>{if(m.rec||m.cmv||m.imp||m.fixo||m.nop)comDados.push(i);});
    if(comDados.length===0){
      document.getElementById('content').innerHTML=`<div class="note">📊 <b>DRE</b> — mostra o resultado (lucro) calculado dos seus lançamentos, mês a mês.</div><div class="card empty"><div class="big">📊</div><b>Ainda sem dados pra montar o DRE</b><div style="margin-top:6px">Conforme você for lançando, o DRE se preenche sozinho aqui. Lance receitas e despesas em <b>Lançamentos</b> e volte.</div></div>`;
      return;
    }
    let saldoAnt=0;
    const cols=comDados.map(i=>{
      const d=meses[i];const margem=d.rec-d.cmv;const resultOp=margem-d.imp-d.fixo;const resultFinal=resultOp-d.nop;const saldoAtual=saldoAnt+resultFinal;
      const r={mesNome:MESES_NOME[i],...d,margem,resultOp,resultFinal,saldoAnt,saldoAtual};saldoAnt=saldoAtual;return r;
    });
    const av=(v,rec)=>rec?`<span style="color:var(--muted);font-size:11px">${(v/rec*100).toFixed(1).replace('.',',')}%</span>`:'';
    const head=`<th></th><th>Conta</th>`+cols.map(c=>`<th style="text-align:right">${c.mesNome}</th>`).join('');
    const line=(op,nome,key,o={})=>`<tr class="${o.cls||''}"><td style="text-align:center;color:var(--muted);font-weight:700">${op}</td><td>${nome}</td>`+cols.map(c=>{const v=o.sign?o.sign*c[key]:c[key];return `<td style="text-align:right;${v<0?'color:var(--red)':''}">${BRL(v)}<br>${av(Math.abs(c[key]),c.rec)}</td>`}).join('')+`</tr>`;
    const sl=(nome,key)=>`<tr style="font-size:12px;color:var(--muted)"><td></td><td>${nome}</td>`+cols.map(c=>`<td style="text-align:right"><b style="color:var(--txt)">${BRL(c[key])}</b></td>`).join('')+`</tr>`;
    document.getElementById('content').innerHTML=`<div class="note">📊 <b>DRE</b> — calculado de verdade dos seus lançamentos. <b>CMV</b> = custo da mercadoria vendida. Transferências entre lojas não entram (são neutras).</div>
    <div class="card"><div class="cardhead"><h3>DRE — ${LOJAS.find(l=>l.id===lojaAtual)?.nome||''}</h3><span class="tag">${ANO_FIXO}</span></div>
    <div style="overflow-x:auto"><table style="font-variant-numeric:tabular-nums;font-size:12.5px"><thead><tr>${head}</tr></thead><tbody>
      ${line('','Receita','rec')}
      ${line('−','Custo da Mercadoria (CMV)','cmv',{sign:-1})}
      ${line('=','Margem de Contribuição','margem',{cls:''})}
      ${line('−','Imposto','imp',{sign:-1})}
      ${line('−','Custo Fixo','fixo',{sign:-1})}
      ${line('=','Resultado Operacional','resultOp')}
      ${line('−','Não Operacional','nop',{sign:-1})}
      ${line('=','Resultado Final','resultFinal')}
      ${sl('Saldo anterior','saldoAnt')}
      ${sl('Saldo atual','saldoAtual')}
    </tbody></table></div></div>`;
  }

  function seletorMes(){return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 14px;width:fit-content">

  async function viewFechamento(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    await carregarLancAno();
    // calcula entradas e saídas do mês selecionado (ignora neutras)
    let entradas=0,saidas=0;
    LANC_ANO.forEach(l=>{
      const g=l.categorias&&l.categorias.grupo;if(g==='neutra')return;
      const m=parseInt(l.data.split('-')[1],10)-1;if(m!==mesSel)return;

    });
    const resultado=entradas-saidas;
    document.getElementById('content').innerHTML=`<div class="note">🔐 <b>Fechamento do mês</b> — confere o que entrou, o que saiu e o resultado do mês, a partir dos seus lançamentos. (A conciliação completa com saldo do banco a gente refina depois.)</div>

        <div class="cfgrow">Saídas (pago)<b style="margin-left:auto;color:var(--red)">-${BRL(saidas)}</b></div>
        <div class="cfgrow" style="border-top:2px solid var(--line)"><b>Resultado do mês</b><b style="margin-left:auto;color:${resultado>=0?'var(--green)':'var(--red)'};font-size:17px">${BRL(resultado)}</b></div>
      </div>

        <p class="mut" style="font-size:13px;line-height:1.6;margin-top:8px">A conciliação completa — aquela do "faltando 🚨 / sobrando ✅" comparando com o saldo real do banco — a gente liga numa próxima etapa, junto com os saldos iniciais de cada loja. Por enquanto, o resumo ao lado já mostra o resultado real do mês.</p>

  let IMPORT=[];
  let importPeriodo={de:'',ate:''};
  let importObs='';
  // regras de categoria por texto (memo+name), baseadas no extrato real
  const REGRAS_CAT=[
    [/ANTECIPA|CR COMPRAS|SIPAG|STONE|PAGSEGURO|PAGBANK|PAG\\*|GETNET|CIELO|REDE /i,'Cartão'],
    [/DEP\.?DINHEIRO/i,'__IGNORAR__'],
    [/EMPR[ÉE]STIMO|JUROS CONTA|PARCELAS SUBSC/i,'Empréstimo'],
    [/ESSILOR|LENTE/i,'Lentes/Laboratório'],
    [/PEREGO|GV OPTICAL|FREEFORM|SURFA/i,'Surfaçagem Freeform'],
    [/FZ GRIFES|LUXOTICA/i,'Óculos/FZ Grifes'],
    [/PACOTE SERVI|IOF|TARIFA|DÉB\.CONV/i,'Tarifas Banco'],
    [/SIMPLES|DAS|DARF/i,'Imposto (Simples)'],
    [/CEMIG|SANEAMENTO|SAAE|VIVO|TELEFON/i,'CEMIG/SAAE/Telefones'],
    [/CONTABIL/i,'Contabilidade'],
    [/SAL[AÁ]RIO|RESCIS|FOLHA|FGTS|VALE /i,'Funcionários'],
    [/MIDIA|FACEBOOK|GOOGLE|MARKETING/i,'Mídia'],
    [/SEGURO/i,'Tarifas Banco'],
  ];
  const REGRAS_CONTATO=[
    [/ESSILOR/i,'Essilor'],[/PEREGO/i,'Perego'],[/GV OPTICAL/i,'GV Optical'],
    [/SATISLOH/i,'Satisloh'],[/MULTI[OÓ]PTICA/i,'Multióptica'],
    [/CEMIG/i,'CEMIG'],[/VIVO/i,'Vivo'],[/VALENET/i,'Valenet'],[/CONTABIL/i,'Contabilidade'],
  ];
  function adivinhaCat(txt){for(const[rx,c]of REGRAS_CAT)if(rx.test(txt))return c;return null;}
  function adivinhaContato(txt){for(const[rx,c]of REGRAS_CONTATO)if(rx.test(txt))return c;return null;}
  // detecta transferência entre lojas (contas Rocha)
  function ehTransferenciaRocha(txt){return /TRANSF\.CONTAS|OTICA ROCHA|REM\.:|FAV\.:/i.test(txt);}
  // classifica recebimento pro fluxo misto do Lucas
  function tipoRecebimento(memo,name){
    const t=(memo+' '+name);
    if(/ANTECIPA|CR COMPRAS|SIPAG|STONE|PAGSEGURO|PAGBANK|PAG\\*|GETNET|CIELO|REDE /i.test(t))return 'conta';   // cartão: conta pelo banco
    if(/DEP\.?DINHEIRO/i.test(t))return 'ignora';             // dinheiro: Linx já contou
    if(/PIX RECEBIDO|TRANSF\.RECEBIDA/i.test(t))return 'confere'; // pix: conferir
    return 'confere';
  }

  function parseOFX(txt){
    // separa cada transação
    const trans=[];
    const blocos=txt.split('<STMTTRN>').slice(1);
    blocos.forEach(b=>{
      const corte=b.split('</STMTTRN>')[0];
      const get=(tag)=>{const m=corte.match(new RegExp('<'+tag+'>([^<\\n]*)'));return m?m[1].trim():'';};
      const tipo=get('TRNTYPE');
      const amt=parseFloat(get('TRNAMT'));
      const dt=get('DTPOSTED').slice(0,8); // AAAAMMDD
      const fitid=get('FITID');
      const memo=get('MEMO');
      const name=get('NAME');
      if(!dt||isNaN(amt))return;
      const iso=dt.slice(0,4)+'-'+dt.slice(4,6)+'-'+dt.slice(6,8);
      const desc=(name||memo||'').trim();
      trans.push({iso,amt,fitid,memo,name,desc});
    });
    return trans;
  }

  function cicloDestino(i,next){IMPORT[i].destino=next;render();}

  function lerArquivoOFX(input){
    const file=input.files[0];if(!file)return;
    // só aceita OFX (protege contra PDF/Excel por engano)
    if(!file.name.toLowerCase().endsWith('.ofx')){
      toast('⚠️ Só aceita arquivo OFX! Baixe o extrato no formato OFX no Sicoob.','erro');
      input.value='';return;
    }
    const reader=new FileReader();
    reader.onload=function(e){
      let txt=e.target.result;
      // confere se é mesmo um OFX por dentro
      if(!/<STMTTRN>|OFXHEADER|<OFX>/i.test(txt)){
        toast('⚠️ Esse arquivo não parece um extrato OFX válido.','erro');
        input.value='';return;
      }
      const trans=parseOFX(txt);
      if(trans.length===0){toast('Não consegui ler transações do arquivo','erro');return;}
      // pega o período do extrato (DTSTART e DTEND)
      const ds=txt.match(/<DTSTART>(\d{8})/);const de=txt.match(/<DTEND>(\d{8})/);
      importPeriodo={de:ds?`${ds[1].slice(6,8)}/${ds[1].slice(4,6)}/${ds[1].slice(0,4)}`:'',ate:de?`${de[1].slice(6,8)}/${de[1].slice(4,6)}/${de[1].slice(0,4)}`:''};
      // monta a lista com adivinhação
      IMPORT=trans.map(t=>{
        const full=(t.memo+' '+t.name);
        const item={iso:t.iso,amt:t.amt,fitid:t.fitid,desc:t.desc||t.memo};
        // recebimentos: só cartão entra; pix e dinheiro ignoram (Linx já conta)
        if(t.amt>0){
          if(/ANTECIPA|CR COMPRAS|SIPAG|STONE|PAGSEGURO|PAGBANK|PAG\\*|GETNET|CIELO|REDE /i.test(full)){item.destino='conta';const c=catsAtivas().find(c=>c.nome==='Cartão');item.catId=c?c.id:null;}
          else {item.destino='ignora';} // pix, dinheiro, transferência recebida: Linx conta
          return item;
        }
        // saídas: adivinha categoria. Transferência entre lojas vira "a corrigir" pra Heloísa conferir
        if(ehTransferenciaRocha(full)){item.catId='';item.corrigir=true;return item;}
        const catNome=adivinhaCat(full);
        if(catNome&&catNome!=='__IGNORAR__'){const c=catsAtivas().find(c=>c.nome===catNome);item.catId=c?c.id:'';}else item.catId='';
        const contNome=adivinhaContato(full);
        if(contNome){const c=contatosAtivos().find(c=>c.nome===contNome);item.contatoId=c?c.id:null;}
        return item;
      });
      toast(trans.length+' transações lidas!','ok');
      render();
    };
    reader.readAsText(file,'ISO-8859-1'); // Sicoob usa Latin1
  }

  async function confirmarImport(){
    const btn=document.getElementById('btnConfImport');if(btn){btn.disabled=true;btn.textContent='Lançando...';}
    const catCartao=catsAtivas().find(c=>c.nome==='Cartão');
    const catTransf=catsAtivas().find(c=>c.grupo==='neutra');
    // extrato é sempre do Sicoob — pega a conta Sicoob da loja
    const contaSicoob=CONTAS.find(c=>/sicoob/i.test(c.nome))||CONTAS[0];
    const registros=[];
    let semContato=0;
    IMPORT.forEach(r=>{
      if(r.amt>0&&r.destino==='ignora')return; // pula pix e dinheiro (Linx conta)
      let catId=r.catId||null,contatoId=r.contatoId||null,tipoDb;
      if(r.amt>0){catId=catCartao?catCartao.id:r.catId;tipoDb='receita';}
      else {catId=r.catId||null;tipoDb='despesa';}
      registros.push({
        loja_id:lojaAtual,conta_id:contaSicoob?contaSicoob.id:null,data:r.iso,descricao:(r.desc||'').toUpperCase().slice(0,200),
        valor:r.amt,tipo:tipoDb,categoria_id:catId||null,contato_id:contatoId,
        pago:true,origem:'ofx',fitid:r.fitid||null,criado_por:USER.id
      });
    });
    // insere em lotes, ignorando duplicados (fitid)
    let ok=0,dup=0,erro=0;
    for(const reg of registros){
      const {error}=await sb.from('lancamentos').insert(reg);
      if(error){if(error.message.includes('duplicate')||error.code==='23505')dup++;else erro++;}
      else ok++;
    }
    // salva o histórico da importação
    try{
      await sb.from('importacoes').insert({
        loja_id:lojaAtual,
        periodo_de:importPeriodo.de?importPeriodo.de.split('/').reverse().join('-'):null,
        periodo_ate:importPeriodo.ate?importPeriodo.ate.split('/').reverse().join('-'):null,
        qtd_lancamentos:ok,observacao:importObs||null,importado_por:USER.id
      });
    }catch(e){}
    IMPORT=[];importObs='';importPeriodo={de:'',ate:''};
    toast(`${ok} lançados · ${dup} já existiam · ${erro} com erro`, erro>0?'erro':'ok');
    go('lanc');
  }

  }

  // ---- COMPARATIVO mês a mês ----
  async function viewComparativo(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Calculando...</div>';
    await carregarLancAno();
    const meses=Array.from({length:12},()=>({entrada:0,saida:0}));
    LANC_ANO.forEach(l=>{
      const g=l.categorias&&l.categorias.grupo;if(g==='neutra')return;
      const m=parseInt(l.data.split('-')[1],10)-1;const v=Number(l.valor);
      if(v>0)meses[m].entrada+=v;else meses[m].saida+=Math.abs(v);
    });
    const comDados=[];meses.forEach((m,i)=>{if(m.entrada||m.saida)comDados.push(i);});
    if(comDados.length===0){document.getElementById('content').innerHTML='<div class="note">📈 <b>Comparativo</b> — entradas, saídas e resultado de cada mês, lado a lado.</div><div class="card empty"><div class="big">📈</div>Sem dados ainda. Conforme você lança, os meses aparecem aqui.</div>';return;}
    const maxVal=Math.max(...comDados.map(i=>Math.max(meses[i].entrada,meses[i].saida)));
    const rows=comDados.map(i=>{
      const m=meses[i];const res=m.entrada-m.saida;
      const barE=maxVal>0?(m.entrada/maxVal*100):0;const barS=maxVal>0?(m.saida/maxVal*100):0;
      return `<tr><td><b>${MESES_NOME[i]}</b></td>
        <td style="width:200px"><div style="background:rgba(61,220,145,.15);border-radius:4px;height:18px;width:${barE}%;min-width:2px"></div></td>
        <td class="amt green">${BRL(m.entrada)}</td>
        <td style="width:200px"><div style="background:rgba(255,107,107,.15);border-radius:4px;height:18px;width:${barS}%;min-width:2px"></div></td>
        <td class="amt red">-${BRL(m.saida)}</td>
        <td class="amt"><b style="color:${res>=0?'var(--green)':'var(--red)'}">${BRL(res)}</b></td></tr>`;
    }).join('');
    document.getElementById('content').innerHTML=`<div class="note">📈 <b>Comparativo ${ANO_FIXO}</b> — entradas (verde) e saídas (vermelho) de cada mês, com o resultado.</div>
      <div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Mês</th><th>Entradas</th><th style="text-align:right">Total</th><th>Saídas</th><th style="text-align:right">Total</th><th style="text-align:right">Resultado</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  // ---- FECHAMENTO DE CAIXA (diário) ----
  async function viewCaixa(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    await carregarLancamentos();
    // agrupa por dia
    const dias={};
    LANC.forEach(l=>{
      const g=l.categorias&&l.categorias.grupo;if(g==='neutra')return;
      if(!dias[l.data])dias[l.data]={data:l.data,entrada:0,saida:0,qtd:0};
      const v=Number(l.valor);if(v>0)dias[l.data].entrada+=v;else dias[l.data].saida+=Math.abs(v);
      dias[l.data].qtd++;
    });
    const lista=Object.values(dias).sort((a,b)=>a.data.localeCompare(b.data));
    if(lista.length===0){document.getElementById('content').innerHTML='<div class="note">🧮 <b>Fechamento de caixa</b> — resumo de cada dia: o que entrou, o que saiu e o resultado do dia.</div><div class="card empty"><div class="big">🧮</div>Nenhum lançamento ainda</div>';return;}
    const rows=lista.map(d=>{const res=d.entrada-d.saida;return `<tr style="cursor:pointer" onclick="go('lanc');setTimeout(()=>{filtroDia='${d.data}';render();},100)"><td><b>${isoParaBR(d.data)}</b></td><td class="mut">${d.qtd} lançamento(s)</td><td class="amt green">${BRL(d.entrada)}</td><td class="amt red">-${BRL(d.saida)}</td><td class="amt"><b style="color:${res>=0?'var(--green)':'var(--red)'}">${BRL(res)}</b></td></tr>`;}).join('');
    document.getElementById('content').innerHTML=`<div class="note">🧮 <b>Fechamento de caixa</b> — cada dia com entradas, saídas e resultado. Clique num dia pra ver os lançamentos dele.</div>
      <div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Dia</th><th></th><th style="text-align:right">Entradas</th><th style="text-align:right">Saídas</th><th style="text-align:right">Resultado</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  // ---- RECORRENTES ----
  async function viewRecorrentes(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    const {data}=await sb.from('recorrentes').select('*, categorias(nome), contatos(nome)').eq('loja_id',lojaAtual).order('dia_vencimento');
    const recs=data||[];
    const rows=recs.map(r=>`<div class="cfgrow"><b>${r.descricao}</b> <span class="catchip" style="margin-left:8px">${r.categorias?.nome||'—'}</span><span class="mut" style="margin-left:8px">dia ${r.dia_vencimento||'—'}</span><b style="margin-left:auto;color:var(--red)">${BRL(r.valor)}</b><span class="arqbtn" onclick="excluirRecorrente(${r.id})">🗑 remover</span></div>`).join('');
    document.getElementById('content').innerHTML=`<div class="note">🔁 <b>Lançamentos recorrentes</b> — contas que se repetem todo mês (aluguel, folha, internet). Cadastre aqui pra não esquecer; depois você lança/confirma cada mês.</div>
      ${podeEditar()?`<div class="card" style="margin-bottom:16px"><div class="cardhead"><h3>Novo recorrente</h3></div>
        <div style="display:grid;grid-template-columns:1fr 130px 90px auto;gap:8px;margin-top:10px;align-items:end">
          <div><span class="qlabel">Descrição</span><input id="recDesc" class="qin maiusc" placeholder="Ex: ALUGUEL LOJA"></div>
          <div><span class="qlabel">Valor</span><input id="recVal" class="qin calc" data-cents="0" placeholder="0,00" inputmode="numeric" onkeydown="calcInput(this,event)"></div>
          <div><span class="qlabel">Dia</span><input id="recDia" class="qin" placeholder="10" inputmode="numeric" maxlength="2" style="text-align:center"></div>
          <button class="btn" onclick="addRecorrente()">+ Add</button>
        </div>
        <div style="margin-top:8px"><span class="qlabel">Categoria</span><select id="recCat" class="qin" style="max-width:260px">${catsOptions()}</select></div></div>`:''}
      <div class="card">${rows||'<p class="mut" style="font-size:13px">Nenhum recorrente cadastrado.</p>'}</div>`;
  }
  async function addRecorrente(){
    const desc=document.getElementById('recDesc').value.trim().toUpperCase();
    const cents=parseInt(document.getElementById('recVal').dataset.cents||'0',10);
    const dia=parseInt(document.getElementById('recDia').value,10)||null;
    const catId=document.getElementById('recCat').value||null;
    if(!desc||!cents){toast('Preencha descrição e valor','erro');return;}
    const {error}=await sb.from('recorrentes').insert({loja_id:lojaAtual,descricao:desc,valor:-(cents/100),categoria_id:catId,dia_vencimento:dia});
    if(error){toast('Erro: '+error.message,'erro');return;}
    toast('Recorrente cadastrado!','ok');viewRecorrentes();
  }
  async function excluirRecorrente(id){if(!confirm('Remover este recorrente?'))return;await sb.from('recorrentes').delete().eq('id',id);toast('Removido','ok');viewRecorrentes();}

  // ---- LIXEIRA ----
  async function viewLixeira(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    const {data}=await sb.from('lixeira').select('*').eq('loja_id',lojaAtual).order('excluido_em',{ascending:false}).limit(200);
    const itens=data||[];
    if(itens.length===0){document.getElementById('content').innerHTML='<div class="note">🗑 <b>Lixeira</b> — lançamentos excluídos ficam aqui. Nada some de vez; você pode restaurar.</div><div class="card empty"><div class="big">🗑</div>Lixeira vazia</div>';return;}
    const rows=itens.map(it=>{const l=it.dados||{};return `<tr><td class="mut">${l.data?isoParaBR(l.data):'—'}</td><td>${l.descricao||'—'}</td><td class="amt ${l.valor>0?'green':'red'}">${l.valor>0?'+':'-'}${BRL(Math.abs(l.valor||0))}</td><td><button class="btn ghost" style="padding:6px 12px" onclick="restaurarLix(${it.id})">↩ Restaurar</button></td></tr>`;}).join('');
    document.getElementById('content').innerHTML=`<div class="note">🗑 <b>Lixeira</b> — ${itens.length} lançamento(s) excluído(s). Clique em restaurar pra trazer de volta.</div>
      <div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Data</th><th>Descrição</th><th style="text-align:right">Valor</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  async function restaurarLix(lixId){
    const {data:lix}=await sb.from('lixeira').select('*').eq('id',lixId).single();
    if(!lix){toast('Não encontrado','erro');return;}
    const l=lix.dados;
    // remove campos que o banco gera sozinho
    delete l.id;delete l.criado_em;delete l.categorias;delete l.contatos;delete l.contas;
    const {error}=await sb.from('lancamentos').insert(l);
    if(error){toast('Erro ao restaurar: '+error.message,'erro');return;}
    await sb.from('lixeira').delete().eq('id',lixId);
    toast('Restaurado!','ok');viewLixeira();
  }

  // ---- CONFIGURAÇÕES ----
  async function viewConfig(){
    document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span> Carregando...</div>';
    await carregarContas();
    // calcula o saldo atual de cada conta (saldo inicial + entradas - saídas dos lançamentos dessa conta)
    const {data:lancs}=await sb.from('lancamentos').select('valor,conta_id,categorias(grupo)').eq('loja_id',lojaAtual);
    const movPorConta={};
    (lancs||[]).forEach(l=>{const g=l.categorias&&l.categorias.grupo;if(g==='neutra')return;if(!l.conta_id)return;movPorConta[l.conta_id]=(movPorConta[l.conta_id]||0)+Number(l.valor);});
    const contas=CONTAS.map(c=>{
      const ini=Number(c.saldo_inicial_banco||0);
      const atual=ini+(movPorConta[c.id]||0);
      return `<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <b style="font-size:14px">🏦 ${c.nome}</b>
        <span class="arqbtn" style="margin-left:auto" onclick="arquivarConta(${c.id})">📥 arquivar</span></div>
        <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap;align-items:end">
          <div><span class="qlabel">Saldo inicial (o que tinha ao começar)</span>
            <div style="display:flex;gap:6px;align-items:center">
              <button class="btn ghost" id="sinal${c.id}" data-neg="${ini<0?'1':'0'}" onclick="toggleSinal(${c.id})" style="min-width:46px;font-size:18px;font-weight:800;color:${ini<0?'var(--red)':'var(--green)'}">${ini<0?'−':'+'}</button>
              <input class="qin calc" data-cents="${Math.round(Math.abs(ini)*100)}" value="${Math.abs(ini).toLocaleString('pt-BR',{minimumFractionDigits:2})}" inputmode="numeric" onkeydown="calcInput(this,event)" id="saldoIni${c.id}" style="max-width:160px">
            </div></div>
          <button class="btn" onclick="salvarSaldoInicial(${c.id})">Salvar saldo</button>
          <div style="margin-left:auto;text-align:right"><span class="qlabel">Saldo atual (calculado)</span><div style="font-size:20px;font-weight:800;color:${atual>=0?'var(--green)':'var(--red)'};font-variant-numeric:tabular-nums">${BRL(atual)}</div></div>
        </div></div>`;
    }).join('');
    document.getElementById('content').innerHTML=`<div class="note">⚙ <b>Configurações</b> — contas/bancos com saldo. O <b>saldo atual</b> é calculado sozinho: saldo inicial + entradas − saídas. Assim bate com o app do banco.</div>
      ${podeEditar()?`<div class="card" style="margin-bottom:16px"><div class="cardhead"><h3>➕ Nova conta</h3></div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><input id="newConta" class="qin maiusc" placeholder="Nome da conta (ex: SICOOB)" style="max-width:240px"><button class="btn" onclick="addConta()">+ Adicionar conta</button></div></div>
      <h3 style="font-size:14px;margin:18px 0 10px">🏦 Contas de ${LOJAS.find(l=>l.id===lojaAtual)?.nome||''}</h3>
      ${contas||'<p class="mut" style="font-size:13px">Nenhuma conta.</p>'}`:''}
      <div class="card" style="margin-top:16px"><div class="cardhead"><h3>🔒 Segurança</h3></div>
        <div class="cfgrow">Senha para excluir lançamento<b style="margin-left:auto">1234</b></div>
        <div class="cfgrow">Seu acesso<b style="margin-left:auto">${PERFIL.nome} · ${PERFIL.papel}</b></div>
      </div>
      <div class="card" style="margin-top:16px"><div class="cardhead"><h3>ℹ️ Sobre</h3></div>
        <p class="mut" style="font-size:13px;line-height:1.7;margin-top:6px">Sistema Financeiro do Grupo Rocha. Dados salvos com segurança no banco. Cada loja tem seus lançamentos; categorias e contatos são compartilhados.</p></div>`;
  }
  function toggleSinal(id){
    const b=document.getElementById('sinal'+id);
    const neg=b.dataset.neg==='1';
    b.dataset.neg=neg?'0':'1';
    b.textContent=neg?'+':'−';
    b.style.color=neg?'var(--green)':'var(--red)';
  }
  async function salvarSaldoInicial(id){
    const cents=parseInt(document.getElementById('saldoIni'+id).dataset.cents||'0',10);
    const neg=document.getElementById('sinal'+id).dataset.neg==='1';
    const valor=(neg?-1:1)*(cents/100);
    const {error}=await sb.from('contas').update({saldo_inicial_banco:valor}).eq('id',id);
    if(error){toast('Erro: '+error.message,'erro');return;}
    const c=CONTAS.find(x=>x.id===id);if(c)c.saldo_inicial_banco=valor;
    toast('Saldo inicial salvo!','ok');viewConfig();
  }
  async function addConta(){
    const nome=document.getElementById('newConta').value.trim().toUpperCase();
    if(!nome){toast('Digite o nome da conta','erro');return;}
    const {error}=await sb.from('contas').insert({loja_id:lojaAtual,nome});
    if(error){toast('Erro: '+error.message,'erro');return;}
    toast('Conta adicionada!','ok');viewConfig();
  }
  async function arquivarConta(id){await sb.from('contas').update({arquivada:true}).eq('id',id);toast('Conta arquivada','ok');viewConfig();}

  function fecharModal(){document.getElementById('modalRoot').innerHTML='';}

  // ====== GRÁFICO DE ROSCA (SVG puro) ======
  const CORES_GRAF=['#3ddc91','#7da2ff','#e8c468','#ff6b6b','#c084fc','#4dd4d4','#f5905a','#a0d468','#ec87c0','#5d9cec','#aab2bd','#ffce54','#48cfad','#ed5565','#967adc'];
  function donut(itens,total){
    // itens: [{nome,valor,pct}] já ordenados. total: soma
    if(total<=0||itens.length===0)return '<div class="empty" style="padding:30px"><div class="big">📊</div>Sem dados neste mês</div>';
    const R=70,r=42,cx=90,cy=90;let ang=-Math.PI/2;
    const arcs=itens.map((it,i)=>{
      const frac=it.valor/total;const a2=ang+frac*Math.PI*2;
      const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
      const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2);
      const xi1=cx+r*Math.cos(ang),yi1=cy+r*Math.sin(ang);
      const large=frac>0.5?1:0;
      const cor=CORES_GRAF[i%CORES_GRAF.length];
      const path=`M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${r} ${r} 0 ${large} 0 ${xi1} ${yi1} Z`;
      ang=a2;
      // rótulo de % na fatia (só se >5%)
      let lbl='';
      if(frac>0.05){const mid=(ang+ (ang-frac*Math.PI*2))/2;const lx=cx+(R+r)/2*Math.cos(mid),ly=cy+(R+r)/2*Math.sin(mid);lbl=`<text x="${lx}" y="${ly}" fill="#04130c" font-size="10" font-weight="800" text-anchor="middle" dominant-baseline="middle">${(frac*100).toFixed(1).replace('.',',')}%</text>`;}
      return `<path d="${path}" fill="${cor}"></path>${lbl}`;
    }).join('');
    return `<svg viewBox="0 0 180 180" style="width:180px;height:180px;flex-shrink:0">${arcs}</svg>`;
  }
  function legenda(itens,total){
    return itens.map((it,i)=>{
      const cor=CORES_GRAF[i%CORES_GRAF.length];const pct=total>0?(it.valor/total*100):0;
      return `<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px">
        <span style="width:11px;height:11px;border-radius:3px;background:${cor};flex-shrink:0"></span>
        <span style="flex:1">${it.nome} <span class="mut" style="font-size:11px">${pct.toFixed(1).replace('.',',')}%</span></span>
        <b style="font-variant-numeric:tabular-nums">${BRL(it.valor)}</b></div>`;
    }).join('');
  }
  function graficoCard(titulo,itens,total,corTotal,refMes){
    return `<div class="card"><div class="cardhead"><h3 style="font-size:14px">${titulo}</h3></div>
      <div style="display:flex;flex-direction:column;align-items:center;margin-top:6px">
        ${donut(itens,total)}
        <div style="width:100%;margin-top:10px">${legenda(itens,total)||'<div class="mut" style="font-size:13px;padding:16px 0;text-align:center">Sem dados neste mês</div>'}</div>
      </div>
      <div style="display:flex;justify-content:space-between;border-top:2px solid var(--line);margin-top:10px;padding-top:10px"><b>Total</b><b style="color:${corTotal};font-size:15px">${BRL(total)}</b></div>
      ${refMes?`<div class="mut" style="font-size:11px;text-align:center;margin-top:6px">referente a ${refMes} ${ANO_FIXO}</div>`:''}</div>`;
  }

  // maiúsculo automático em qualquer campo com classe "maiusc"
  document.addEventListener('input',function(e){
    const el=e.target;
    if(el&&el.classList&&el.classList.contains('maiusc')&&el.type!=='date'){
      const pos=el.selectionStart;const up=el.value.toUpperCase();
      if(el.value!==up){el.value=up;try{el.setSelectionRange(pos,pos);}catch(_){}}
    }
  });

  window.addEventListener('load',async()=>{
    if(!initSupabase())return;
    try{const {data}=await sb.auth.getSession();if(data&&data.session){await iniciarApp(data.session.user);}}catch(e){}
  });
  </script>
